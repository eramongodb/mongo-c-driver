language = "C"

include_guard = "MONGOC_RUST_H"
autogen_warning = "/* Generated by src/rust/CMakeLists.txt */"
include_version = true
sys_includes = ["bson/bson_t.h", "stdbool.h", "stdint.h"]
no_includes = true
cpp_compat = true

braces = "NextLine"
line_length = 120
tab_width = 3
documentation = true
documentation_style = "c99"

[export.rename]
"Client" = "mongoc_rust_client_t"
"Database" = "mongoc_rust_database_t"
"Collection" = "mongoc_rust_collection_t"
"Future" = "mongoc_rust_future_t"
