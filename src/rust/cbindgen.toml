language = "C"

include_guard = "MONGOC_RUST_H"
autogen_warning = "/* Generated by src/rust/CMakeLists.txt */"
include_version = true
sys_includes = ["stdint.h"]
no_includes = true
cpp_compat = true

braces = "NextLine"
line_length = 120
tab_width = 3
documentation = true
documentation_style = "c99"
